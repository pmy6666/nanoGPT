# Central trainer config. Keep it simple so the built-in loader can parse it.

stage1_minimal_train:
  gpt:
    vocab_size: 0
    block_size: 128
    n_layer: 4
    n_head: 4
    n_embd: 128
    dropout: 0.1
    attention_impl: "manual"
    gradient_checkpointing: false
  train:
    batch_size: 16
    max_steps: 200
    eval_interval: 50
    eval_iters: 20
    learning_rate: 0.0003
    weight_decay: 0.01
    warmup_steps: 20
    min_lr_ratio: 0.1
    grad_clip: 1.0

stage2_amp_train:
  gpt:
    vocab_size: 0
    block_size: 128
    n_layer: 4
    n_head: 4
    n_embd: 128
